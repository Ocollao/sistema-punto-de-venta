services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pos_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_PASSWORD:-PosSystem2024!}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - pos_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD:-PosSystem2024!}' -Q 'SELECT 1' -No -C"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pos_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - pos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pos_frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - pos_network

volumes:
  sqlserver_data:

networks:
  pos_network:
    driver: bridge
