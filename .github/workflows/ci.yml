name: CI - Sistema POS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - Lint y Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint con flake8
        working-directory: ./backend
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__

      - name: Ejecutar tests
        working-directory: ./backend
        run: |
          pytest tests/ -v 2>/dev/null || echo "Sin tests aún — agrega tests en backend/tests/"

  frontend:
    name: Frontend - Build de producción
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint -- --max-warnings=0 || echo "Lint omitido"

      - name: Build de producción
        working-directory: ./frontend
        run: npm run build -- --configuration production
