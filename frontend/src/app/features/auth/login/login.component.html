<div class="min-h-screen bg-slate-900 flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Sistema POS</h1>
      <p class="text-slate-400 mt-1">Ingresa tus credenciales para continuar</p>
    </div>

    <!-- Formulario -->
    <div class="bg-slate-800 rounded-2xl shadow-xl p-8">
      <form [formGroup]="form" (ngSubmit)="iniciarSesion()" class="space-y-5">

        <!-- Error -->
        <div *ngIf="error" class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg">
          {{ error }}
        </div>

        <!-- Correo -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Correo electrónico</label>
          <input formControlName="email" type="email" placeholder="usuario@empresa.cl"
            class="w-full bg-slate-700 border border-slate-600 text-white placeholder-slate-400
                   rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <!-- Contraseña -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Contraseña</label>
          <input formControlName="password" type="password" placeholder="••••••••"
            class="w-full bg-slate-700 border border-slate-600 text-white placeholder-slate-400
                   rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <!-- Botón -->
        <button type="submit" [disabled]="form.invalid || cargando"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed
                 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors text-sm">
          {{ cargando ? 'Iniciando sesión...' : 'Iniciar sesión' }}
        </button>

      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">Sistema de Punto de Venta v1.0</p>
  </div>
</div>
